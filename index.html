<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="apple-touch-icon" type="image/png" sizes="32x32" href="./favicon.png">

  <title>Order summary card</title>

  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>

  <main>
    <article class="card">
      <div class="card__media"></div>

      <div class="card__content">
        <h1>Order Summary</h1>

        <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>

        <div class="plan">
          <img src="./assets/images/icon-music.svg" alt="">
          <dl class="plan__info">
            <dt>Annual Plan</dt>
            <dd>$59.99/year</dd>
          </dl>
          <a href="#">Change</a>
        </div>

        <div class="card__actions">
          <button type="button" class="btn btn--primary">Proceed to Payment</button>
          <button type="button" class="btn btn--secondary">Cancel Order</button>
        </div>
      </div>
    </article>
  </main>

  <footer class="attribution">
    <small>Challenge by <a href="https://www.frontendmentor.io/challenges" target="_blank"
        rel="noopener noreferrer">Frontend Mentor</a> &ndash; Coded by <a
        href="https://www.frontendmentor.io/profile/vimpdev" target="_blank" rel="noopener noreferrer">VIMP</a></small>
  </footer>
</body>

</html>
